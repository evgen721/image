<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pollinations.ai Image Generator — обновленный интерфейс</title>
  <style>
    :root {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --bg-tertiary: #2a2a2a;
      --text-primary: #f5f5f5;
      --text-secondary: #b0b0b0;
      --accent: #7c4dff;
      --accent-hover: #651fff;
      --success: #067d4c;
      --error: #f44336;
      --warning: #ff9800;
      --border: #333;
      --input-bg: #252525;
      --input-border: #444;
      --shadow: 0 4px 12px rgba(0,0,0,0.4);
      /* новая подсветка для выбранной модели */
      --model-selected-bg: rgba(124, 77, 255, 0.08);
      --model-selected-border: #7c4dff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.5;
      padding: 0;
      margin: 0;
      min-height: 100vh;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      padding: 16px;
    }

    /* === AUTH SECTION === */
    .auth-section {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .auth-section h2 {
      font-size: 1.1rem;
      margin-right: 20px;
      color: var(--accent);
    }

    .auth-input-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .auth-input-group input {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--text-primary);
      min-width: 280px;
      font-size: 0.9rem;
    }

    .auth-input-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: #3a3a3a; }
    .btn-danger { background: var(--error); }
    .btn-danger:hover { background: #d32f2f; }
    .btn-success { background: var(--success); }
    .btn-success:hover { background: #067d4ca8; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-left: auto;
      font-size: 1.1rem;
    }

    .user-info .balance {
      background: var(--bg-tertiary);
      padding: 6px 12px;
      border-radius: 6px;
      color: var(--warning);
      font-weight: 500;
    }

    .user-info .email {
      color: var(--text-secondary);
    }

    /* === PROMPT SECTION === */
    .prompt-section {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .prompt-section h3 {
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 1.1rem;
    }

    .prompt-wrapper {
      position: relative;
      margin-bottom: 10px;
    }

    #prompt {
      width: 100%;
      min-height: 100px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      resize: vertical;
    }

    #prompt:focus {
      outline: none;
      border-color: var(--accent);
    }

    .translation {
      background: var(--bg-tertiary);
      border-left: 3px solid var(--accent);
      padding: 8px 12px;
      margin-top: 8px;
      border-radius: 0 6px 6px 0;
      font-size: 0.9rem;
      color: var(--text-secondary);
      min-height: 24px;
    }

    .translation.empty { display: none; }

    .image-drop-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin: 12px 0 0;
      background: var(--input-bg);
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .image-drop-zone:hover,
    .image-drop-zone.dragover {
      border-color: var(--accent);
      background: #2a2a4a;
    }

    .image-drop-zone input[type="file"] { display: none; }

    .image-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      padding: 8px;
      background: var(--bg-tertiary);
      border-radius: 6px;
    }

    .image-preview img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .image-preview .remove-img {
      background: var(--error);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    /* === MODEL SELECTION === */
    .models-section {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }

    .models-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .models-header h3 {
      color: var(--accent);
      font-size: 1.1rem;
      margin: 0;
    }

    .model-count {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .model-count span {
      color: var(--warning);
      font-weight: 600;
    }

    .models-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .models-grid::-webkit-scrollbar { width: 6px; }
    .models-grid::-webkit-scrollbar-track { background: var(--bg-tertiary); border-radius: 3px; }
    .models-grid::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    /* НОВЫЙ СТИЛЬ ДЛЯ ВЫДЕЛЕНИЯ ВЫБРАННОЙ МОДЕЛИ */
    .model-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .model-item:hover { border-color: var(--accent); }
    
    /* Выделенная модель (выбрана) */
    .model-item.selected {
      background: var(--model-selected-bg);
      border: 1px solid var(--model-selected-border);
      box-shadow: 0 0 0 1px rgba(124, 77, 255, 0.2);
    }
    
    .model-item.disabled { 
      opacity: 0.5; 
      cursor: not-allowed; 
    }
    .model-item.disabled.selected {
      background: var(--input-bg);
      border-color: var(--input-border);
    }

    .model-item input[type="checkbox"] {
      width: 25px;
      height: 25px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .model-info {
      flex: 1;
      min-width: 0;
    }

    .model-name {
      font-weight: 500;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .model-name .star {
      color: var(--warning);
      font-size: 0.9rem;
    }

    .model-name .img-icon {
      color: var(--accent);
      font-size: 0.9rem;
    }

    .model-price {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .model-price.paid { color: var(--warning); }

    /* === НАСТРОЙКИ — новая компактная строка === */
    .settings-compact {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 0;
      width: 100%;
    }
    .settings-left {
      display: flex;
      align-items: baseline;
      gap: 20px;
      flex-wrap: wrap;
    }
    .settings-left h3 {
      margin: 0;
      font-size: 1.1rem;
      color: var(--accent);
    }
    .settings-controls {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .setting-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .setting-group label {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .setting-group select {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .setting-group select:focus {
      outline: none;
      border-color: var(--accent);
    }
    .setting-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* === GENERATE BUTTON === */
    .generate-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
    }

    #generateBtn {
      padding: 12px 32px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .loading .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .loading.active .spinner { display: inline-block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* === RESULTS SECTION === */
    .results-section {
      margin-top: 20px;
    }

    .results-section h3 {
      margin-bottom: 16px;
      color: var(--accent);
      font-size: 1.1rem;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    @media (max-width: 1200px) {
      .results-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .results-grid { grid-template-columns: 1fr; }
    }

    .result-card {
      background: var(--bg-secondary);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .result-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      background: var(--bg-tertiary);
    }

    .result-info {
      padding: 12px;
      border-top: 1px solid var(--border);
    }

    .result-model {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .result-model .star { color: var(--warning); font-size: 0.8rem; }

    .result-actions {
      display: flex;
      gap: 8px;
    }

    .result-actions .btn {
      flex: 1;
      padding: 6px;
      font-size: 0.85rem;
    }

    /* === UTILS === */
    .hidden { display: none !important; }
    .text-center { text-align: center; }
    .mt-2 { margin-top: 12px; }
    .error-msg {
      color: var(--error);
      font-size: 0.9rem;
      margin-top: 8px;
      padding: 8px;
      background: rgba(244, 67, 54, 0.1);
      border-radius: 6px;
      border-left: 3px solid var(--error);
    }
    .success-msg {
      color: var(--success);
      font-size: 0.9rem;
      margin-top: 8px;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: var(--shadow);
      z-index: 1000;
      animation: slideIn 0.3s ease;
      max-width: 320px;
    }

    @keyframes slideIn {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .toast.error { border-left-color: var(--error); }
    .toast.success { border-left-color: var(--success); }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- === AUTH SECTION === -->
    <section class="auth-section">
      <div class="auth-input-group">
	  <h2>🔐 Авторизация   </h2>
        <input type="password" id="apiKeyInput" placeholder="Вставьте API ключ (sk_ или pk_)" />
        <button class="btn" id="saveKeyBtn">💾 Сохранить</button>
        <button class="btn btn-secondary" id="loadKeyBtn">🔄 Обновить</button>
      </div>
      <div class="user-info hidden" id="userInfo">
        <span class="email" id="userEmail">user@example.com</span>
		<div class="balance">
		Баланс:
        <span class="balance" id="userBalance">0 ₽</span>
		</div>
        <button class="btn btn-danger btn-sm" id="logoutBtn">🚪 Выйти</button>
      </div>
    </section>

    <!-- === PROMPT SECTION === -->
    <section class="prompt-section">
      <h3>✏️ Промт</h3>
      <div class="prompt-wrapper">
        <textarea id="prompt" placeholder="Введите описание изображения на русском..."></textarea>
      </div>
      <div class="translation empty" id="translation">
        <strong>EN:</strong> <span id="translatedText"></span>
      </div>

      <!-- Image Upload -->
      <div class="image-drop-zone" id="dropZone">
        <span>📎 Для редактирования перетащите изображение сюда, или выберите файл, или вставьте из буфера (Ctrl+V)</span>
        <input type="file" id="fileInput" accept="image/*" />
      </div>
      <div class="image-preview hidden" id="imagePreview">
        <img id="previewImg" src="" alt="Preview" />
        <div>
          <strong id="fileName">image.jpg</strong><br/>
          <span id="fileSize" style="color:var(--text-secondary);font-size:0.85rem"></span>
        </div>
        <button class="remove-img" id="removeImg">✕ Удалить</button>
      </div>
    </section>

    <!-- === MODEL SELECTION === -->
    <section class="models-section">
      <div class="models-header">
        <h3>🤖 Выбор моделей</h3>
        <div class="model-count">Выбрано: <span id="selectedCount">0</span>/5</div>
        <button class="btn btn-secondary btn-sm" id="refreshModels">🔄 Обновить</button>
      </div>
      <div class="models-grid" id="modelsGrid">
        <div class="text-center" style="grid-column:1/-1;color:var(--text-secondary);padding:20px;">
          Загрузка моделей...
        </div>
      </div>
    </section>

    <!-- === НАСТРОЙКИ (объединены с заголовком в одну строку) === -->
    <section class="prompt-section" style="padding: 12px 16px;">
      <div class="settings-compact">
        <div class="settings-left">
          <h3>⚙️ Настройки</h3>
		  <div class="settings-controls">
          <div class="setting-group">
            <label for="imageCount">Количество картинок на модель:</label>
            <select id="imageCount">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
            </select>
          </div>
          <div class="setting-group">
            <label>
              <input type="checkbox" id="enhancePrompt" checked /> 
              Улучшить промпт (enhance)
            </label>
          </div>
        </div>
        </div>
        
      </div>
    </section>

    <!-- === GENERATE === -->
    <div class="generate-section">
      <button class="btn btn-success" id="generateBtn" disabled>
        🎨 Сгенерировать изображения
      </button>
      <div class="loading" id="loading">
        <div class="spinner"></div>
      </div>
    </div>

    <!-- === RESULTS === -->
    <section class="results-section hidden" id="resultsSection">
      <h3>🖼️ Результаты</h3>
      <div class="results-grid" id="resultsGrid"></div>
    </section>

  </div>

  <div id="toastContainer"></div>

  <script>
    // === CONFIG ===
    const API_BASE = 'https://gen.pollinations.ai';
    const ACCOUNT_BASE = 'https://enter.pollinations.ai/api';
    const STORAGE_KEY = 'pollinations_api_key';
    
    // === PRICE CONVERSION ===
    const RUB_PER_POLLEN = 75;
    const NANOBANANA_MULTIPLIER = 1150;
    const NANOBANANA_MODELS = ['nanobanana', 'nanobanana-2', 'nanobanana-pro'];
    
    // === STATE ===
    let apiKey = localStorage.getItem(STORAGE_KEY) || '';
    let models = [];
    let selectedModels = [];
    let attachedImage = null;
    let isGenerating = false;

    // === DOM ELEMENTS ===
    const els = {
      apiKeyInput: document.getElementById('apiKeyInput'),
      saveKeyBtn: document.getElementById('saveKeyBtn'),
      loadKeyBtn: document.getElementById('loadKeyBtn'),
      logoutBtn: document.getElementById('logoutBtn'),
      userInfo: document.getElementById('userInfo'),
      userEmail: document.getElementById('userEmail'),
      userBalance: document.getElementById('userBalance'),
      prompt: document.getElementById('prompt'),
      translation: document.getElementById('translation'),
      translatedText: document.getElementById('translatedText'),
      dropZone: document.getElementById('dropZone'),
      fileInput: document.getElementById('fileInput'),
      imagePreview: document.getElementById('imagePreview'),
      previewImg: document.getElementById('previewImg'),
      fileName: document.getElementById('fileName'),
      fileSize: document.getElementById('fileSize'),
      removeImg: document.getElementById('removeImg'),
      modelsGrid: document.getElementById('modelsGrid'),
      selectedCount: document.getElementById('selectedCount'),
      refreshModels: document.getElementById('refreshModels'),
      imageCount: document.getElementById('imageCount'),
      enhancePrompt: document.getElementById('enhancePrompt'),
      generateBtn: document.getElementById('generateBtn'),
      loading: document.getElementById('loading'),
      resultsSection: document.getElementById('resultsSection'),
      resultsGrid: document.getElementById('resultsGrid'),
      toastContainer: document.getElementById('toastContainer')
    };

    // === UTILS ===
    function getModelPriceInPollen(model) {
      if (model.pricing && model.pricing.completionImageTokens) {
        return parseFloat(model.pricing.completionImageTokens);
      }
      if (model.price && model.price.completionImageTokens) {
        return parseFloat(model.price.completionImageTokens);
      }
      return null;
    }

    function isNanobananaModel(modelId) {
      if (!modelId) return false;
      const modelLower = modelId.toLowerCase();
      return NANOBANANA_MODELS.some(m => modelLower === m.toLowerCase() || modelLower.includes(m.toLowerCase()));
    }

    function convertPollenToRub(pollen, modelId) {
      if (!pollen && pollen !== 0) return 0;
      if (isNanobananaModel(modelId)) {
        const adjustedPollen = pollen * NANOBANANA_MULTIPLIER;
        return adjustedPollen * RUB_PER_POLLEN;
      }
      return pollen * RUB_PER_POLLEN;
    }

    function formatPrice(model) {
      const pollenPrice = getModelPriceInPollen(model);
      if (pollenPrice === null) return '';
      const modelId = model.id || model.name;
      const rubPrice = convertPollenToRub(pollenPrice, modelId);
      return `${rubPrice.toFixed(2)} ₽`;
    }

    // === AUTH ===
    function updateAuthUI(isAuthenticated) {
      if (isAuthenticated) {
        els.userInfo.classList.remove('hidden');
        els.generateBtn.disabled = false;
      } else {
        els.userInfo.classList.add('hidden');
        els.generateBtn.disabled = true;
      }
    }

    async function loadUserProfile() {
      try {
        const [profile, balance] = await Promise.all([
          fetch(`${ACCOUNT_BASE}/account/profile`, {
            headers: { 'Authorization': `Bearer ${apiKey}` }
          }).then(r => r.ok ? r.json() : null),
          fetch(`${ACCOUNT_BASE}/account/balance`, {
            headers: { 'Authorization': `Bearer ${apiKey}` }
          }).then(r => r.ok ? r.json() : null)
        ]);
        if (profile?.email) els.userEmail.textContent = profile.email;
        if (balance?.balance !== undefined) {
          const rubBalance = convertPollenToRub(balance.balance);
          els.userBalance.textContent = `${rubBalance.toFixed(2)} ₽`;
        }
      } catch (e) {
        console.warn('Failed to load profile:', e);
        showToast('Не удалось загрузить данные аккаунта', 'error');
      }
    }

    // === MODELS with VISUAL HIGHLIGHT ===
    async function loadModels() {
      els.modelsGrid.innerHTML = '<div class="text-center" style="grid-column:1/-1;color:var(--text-secondary);padding:20px;">Загрузка моделей...</div>';
      try {
        const res = await fetch(`${API_BASE}/image/models`);
        if (!res.ok) throw new Error('Failed to fetch models');
        const allModels = await res.json();
        models = allModels.filter(m => m.output_modalities?.includes('image')).map(m => ({
          id: m.name || m.id,
          name: m.name || m.id,
          paid_only: m.paid_only || false,
          pricing: m.pricing || null,
          price: m.price || null,
          supportsImage: m.input_modalities?.includes('image') || false,
          ...m
        }));
        renderModels();
      } catch (e) {
        console.error('Error loading models:', e);
        els.modelsGrid.innerHTML = `<div class="error-msg" style="grid-column:1/-1;">Ошибка загрузки моделей: ${e.message}</div>`;
      }
    }

    function renderModels() {
      if (models.length === 0) {
        els.modelsGrid.innerHTML = '<div class="text-center" style="grid-column:1/-1;color:var(--text-secondary);padding:20px;">Нет доступных моделей</div>';
        return;
      }

      els.modelsGrid.innerHTML = models.map(model => {
        const isDisabled = !model.supportsImage && attachedImage;
        const isSelected = selectedModels.includes(model.id);
        const priceRub = formatPrice(model);
        return `
          <label class="model-item ${isSelected ? 'selected' : ''} ${isDisabled ? 'disabled' : ''}" data-model="${model.id}">
            <input type="checkbox" ${isSelected ? 'checked' : ''} ${isDisabled ? 'disabled' : ''} 
                   data-model="${model.id}" ${isDisabled ? 'title="Модель не поддерживает загрузку изображений"' : ''}/>
            <div class="model-info">
              <div class="model-name">
                ${model.name}
                ${model.paid_only ? '<span class="star" title="Платная модель">★</span>' : ''}
                ${model.supportsImage ? '<span class="img-icon" title="Поддерживает загрузку изображения">🖼️</span>' : ''}
              </div>
              ${priceRub ? `<div class="model-price ${model.paid_only ? 'paid' : ''}">💰 ${priceRub}</div>` : ''}
            </div>
          </label>
        `;
      }).join('');

      // Attach listeners + синхронизация выделения
      els.modelsGrid.querySelectorAll('.model-item').forEach(label => {
        const cb = label.querySelector('input[type="checkbox"]');
        if (cb) {
          cb.addEventListener('change', handleModelSelection);
        }
      });
      // дополнительно обновим классы для синхронизации при клике на лейбл (чтобы выделение менялось мгновенно)
      els.modelsGrid.querySelectorAll('.model-item').forEach(label => {
        label.addEventListener('click', (e) => {
          if (e.target.type !== 'checkbox') {
            const cb = label.querySelector('input[type="checkbox"]');
            if (cb && !cb.disabled) {
              cb.checked = !cb.checked;
              const changeEvent = new Event('change', { bubbles: true });
              cb.dispatchEvent(changeEvent);
            }
          }
        });
      });
    }

    function handleModelSelection(e) {
      e.stopPropagation();
      const modelId = e.target.dataset.model;
      const isChecked = e.target.checked;
      
      if (isChecked) {
        if (selectedModels.length >= 5) {
          e.target.checked = false;
          showToast('Можно выбрать максимум 5 моделей', 'error');
          return;
        }
        if (!selectedModels.includes(modelId)) selectedModels.push(modelId);
      } else {
        selectedModels = selectedModels.filter(id => id !== modelId);
      }
      
      els.selectedCount.textContent = selectedModels.length;
      updateGenerateButton();
      // визуальное выделение модели (обновляем классы)
      document.querySelectorAll('.model-item').forEach(label => {
        const cb = label.querySelector('input[type="checkbox"]');
        if (cb && cb.dataset.model === modelId) {
          if (isChecked) label.classList.add('selected');
          else label.classList.remove('selected');
        }
      });
    }

    // === PROMPT & TRANSLATION ===
    function setupTranslation() {
      let translateTimeout;
      els.prompt.addEventListener('input', () => {
        clearTimeout(translateTimeout);
        const text = els.prompt.value.trim();
        if (!text || !/[а-яА-ЯёЁ]/.test(text)) {
          els.translation.classList.add('empty');
          return;
        }
        translateTimeout = setTimeout(async () => {
          try {
            const encoded = encodeURIComponent(text);
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ru&tl=en&dt=t&q=${encoded}`);
            const data = await res.json();
            const translated = data[0][0][0];
            els.translatedText.textContent = translated;
            els.translation.classList.remove('empty');
          } catch (e) {
            console.warn('Translation error:', e);
            els.translatedText.textContent = 'Переведите вручную на английский';
            els.translation.classList.remove('empty');
          }
        }, 600);
      });
    }

    // === IMAGE UPLOAD ===
    function setupImageUpload() {
      els.dropZone.addEventListener('click', () => els.fileInput.click());
      els.fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleImageFile(file);
      });
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
        els.dropZone.addEventListener(evt, (e) => { e.preventDefault(); e.stopPropagation(); });
      });
      ['dragenter', 'dragover'].forEach(evt => {
        els.dropZone.addEventListener(evt, () => els.dropZone.classList.add('dragover'));
      });
      ['dragleave', 'drop'].forEach(evt => {
        els.dropZone.addEventListener(evt, () => els.dropZone.classList.remove('dragover'));
      });
      els.dropZone.addEventListener('drop', (e) => {
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleImageFile(file);
      });
      document.addEventListener('paste', (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type?.startsWith('image/')) {
            const file = item.getAsFile();
            if (file) { handleImageFile(file); break; }
          }
        }
      });
      els.removeImg.addEventListener('click', () => {
        attachedImage = null;
        els.imagePreview.classList.add('hidden');
        els.fileInput.value = '';
        renderModels();
        updateGenerateButton();
      });
    }

    async function handleImageFile(file) {
      if (!file.type.startsWith('image/')) { showToast('Выберите изображение', 'error'); return; }
      if (file.size > 10 * 1024 * 1024) { showToast('Файл слишком большой (макс. 10 МБ)', 'error'); return; }
      attachedImage = file;
      els.fileName.textContent = file.name;
      els.fileSize.textContent = formatFileSize(file.size);
      const reader = new FileReader();
      reader.onload = (e) => { els.previewImg.src = e.target.result; els.imagePreview.classList.remove('hidden'); };
      reader.readAsDataURL(file);
      renderModels();
      updateGenerateButton();
      showToast('Изображение добавлено ✓', 'success');
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
      return (bytes/(1024*1024)).toFixed(1) + ' MB';
    }

    // === GENERATION ===
    function updateGenerateButton() {
      const hasPrompt = els.prompt.value.trim().length > 0;
      const hasModels = selectedModels.length > 0;
      const hasAuth = !!apiKey;
      const imageCompatible = !attachedImage || selectedModels.some(id => {
        const m = models.find(x => x.id === id);
        return m?.supportsImage;
      });
      els.generateBtn.disabled = !(hasPrompt && hasModels && hasAuth && imageCompatible);
    }

    async function generateImage({ model, prompt, image, seed, enhance, modelInfo }) {
      try {
        let url, options;
        if (image && modelInfo.supportsImage) {
          url = `${API_BASE}/v1/images/edits`;
          const formData = new FormData();
          formData.append('prompt', prompt);
          formData.append('model', model);
          formData.append('image', image);
          formData.append('seed', seed.toString());
          if (enhance) formData.append('enhance', 'true');
          options = { method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}` }, body: formData };
        } else {
          const params = new URLSearchParams({ model, seed: seed.toString(), width: '1024', height: '1024' });
          if (enhance) params.append('enhance', 'true');
          const encodedPrompt = encodeURIComponent(prompt);
          url = `${API_BASE}/image/${encodedPrompt}?${params.toString()}`;
          options = { method: 'GET', headers: { 'Authorization': `Bearer ${apiKey}` } };
        }
        const res = await fetch(url, options);
        if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
        const contentType = res.headers.get('content-type');
        let imgUrl;
        if (contentType && contentType.includes('application/json')) {
          const data = await res.json();
          if (data.data && data.data[0] && data.data[0].b64_json) {
            const base64Data = data.data[0].b64_json;
            const blob = base64ToBlob(base64Data, 'image/png');
            imgUrl = URL.createObjectURL(blob);
          } else throw new Error('Invalid response format');
        } else {
          const blob = await res.blob();
          imgUrl = URL.createObjectURL(blob);
        }
        return { url: imgUrl, model: modelInfo.name, isPaid: modelInfo.paid_only };
      } catch (e) { console.warn(`Generation failed for ${model}:`, e); return null; }
    }

    function base64ToBlob(base64, contentType) {
      const base64Clean = base64.replace(/^data:image\/\w+;base64,/, '');
      const byteCharacters = atob(base64Clean);
      const byteNumbers = new Array(byteCharacters.length);
      for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
      const byteArray = new Uint8Array(byteNumbers);
      return new Blob([byteArray], { type: contentType });
    }

    function addResultCard({ url, model, isPaid }) {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <img src="${url}" alt="Generated" loading="lazy" />
        <div class="result-info">
          <div class="result-model">${model} ${isPaid ? '<span class="star">★</span>' : ''}</div>
          <div class="result-actions"><button class="btn btn-secondary btn-sm" data-action="save">💾 Сохранить</button></div>
        </div>`;
      card.querySelector('[data-action="save"]').addEventListener('click', () => {
        const a = document.createElement('a'); a.href = url; a.download = `pollinations-${model.replace(/\s+/g, '-')}-${Date.now()}.png`; a.click();
        showToast('Изображение сохранено', 'success');
      });
      els.resultsGrid.appendChild(card);
    }

    // === EVENT LISTENERS ===
    els.saveKeyBtn.addEventListener('click', () => {
      const key = els.apiKeyInput.value.trim();
      if (!key) { showToast('Введите API ключ', 'error'); return; }
      if (!key.startsWith('sk_') && !key.startsWith('pk_')) { showToast('Неверный формат ключа', 'error'); return; }
      apiKey = key; localStorage.setItem(STORAGE_KEY, key); updateAuthUI(true); loadUserProfile(); showToast('Ключ сохранён ✓', 'success');
    });
    els.loadKeyBtn.addEventListener('click', () => {
      const key = localStorage.getItem(STORAGE_KEY);
      if (key) { els.apiKeyInput.value = key; apiKey = key; updateAuthUI(true); loadUserProfile(); showToast('Ключ загружен ✓', 'success'); }
      else showToast('Сохранённый ключ не найден', 'error');
    });
    els.logoutBtn.addEventListener('click', () => { localStorage.removeItem(STORAGE_KEY); apiKey = ''; els.apiKeyInput.value = ''; updateAuthUI(false); showToast('Вы вышли из аккаунта', 'success'); });
    els.refreshModels.addEventListener('click', () => { loadModels(); showToast('Список моделей обновлён', 'success'); });
    els.prompt.addEventListener('input', updateGenerateButton);
    els.generateBtn.addEventListener('click', async () => {
      if (isGenerating) return;
      const prompt = els.prompt.value.trim();
      const translatedPrompt = els.translatedText.textContent || prompt;
      const count = parseInt(els.imageCount.value);
      const enhance = els.enhancePrompt.checked;
      if (!prompt) { showToast('Введите промпт', 'error'); return; }
      if (selectedModels.length === 0) { showToast('Выберите хотя бы одну модель', 'error'); return; }
      if (!apiKey) { showToast('Требуется аутентификация', 'error'); return; }
      const usableModels = attachedImage ? selectedModels.filter(id => models.find(m => m.id === id)?.supportsImage) : selectedModels;
      if (usableModels.length === 0) { showToast('Нет моделей, поддерживающих загрузку изображений', 'error'); return; }
      isGenerating = true; els.loading.classList.add('active'); els.generateBtn.disabled = true; els.resultsGrid.innerHTML = ''; els.resultsSection.classList.remove('hidden');
      const tasks = [];
      const seed = -1;
      for (const modelId of usableModels) {
        const model = models.find(m => m.id === modelId);
        if (!model) continue;
        for (let i = 0; i < count; i++) tasks.push(generateImage({ model: modelId, prompt: translatedPrompt, image: attachedImage, seed: seed + Math.floor(Math.random() * 10000), enhance, modelInfo: model }));
      }
      const results = await Promise.allSettled(tasks);
      results.forEach(result => { if (result.status === 'fulfilled' && result.value) addResultCard(result.value); });
      const successCount = results.filter(r => r.status === 'fulfilled' && r.value).length;
      const failCount = results.length - successCount;
      els.loading.classList.remove('active'); isGenerating = false; els.generateBtn.disabled = false;
      showToast(successCount ? `Готово: ${successCount} изображений${failCount ? `, ${failCount} ошибок` : ''}` : 'Не удалось сгенерировать изображения', successCount ? 'success' : 'error');
    });

    function showToast(message, type = 'info') {
      const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = message; els.toastContainer.appendChild(toast);
      setTimeout(() => { toast.style.animation = 'slideIn 0.3s ease reverse'; setTimeout(() => toast.remove(), 300); }, 3000);
    }

    function setupEventListeners() { els.prompt.addEventListener('input', () => { if (!els.prompt.value.trim()) els.translation.classList.add('empty'); updateGenerateButton(); }); }

    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      if (apiKey) { els.apiKeyInput.value = apiKey; updateAuthUI(true); loadUserProfile(); }
      loadModels(); setupEventListeners(); setupTranslation(); setupImageUpload();
      els.loading.classList.remove('active');
    });
  </script>
</body>
</html>
